<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance | Student Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <i class="bi bi-mortarboard-fill"></i> SMS Admin
    </div>
    <div class="nav flex-column pt-2">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a class="nav-link" href="students.html"><i class="bi bi-people-fill"></i> Students</a>
        <a class="nav-link" href="teachers.html"><i class="bi bi-person-badge-fill"></i> Teachers</a>
        <a class="nav-link" href="courses.html"><i class="bi bi-journal-bookmark-fill"></i> Courses</a>
        <a class="nav-link" href="attendance.html"><i class="bi bi-calendar2-check-fill"></i> Attendance</a>
        <a class="nav-link" href="marks.html"><i class="bi bi-clipboard-data-fill"></i> Marks</a>
        <a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</nav>

<div class="main-content">
    <div class="topbar">
        <button class="sidebar-toggle-btn" id="sidebarToggleBtn"><i class="bi bi-list"></i></button>
        <h5 class="mb-0 fw-bold">Attendance</h5>
        <div class="dropdown">
            <a class="d-flex align-items-center text-decoration-none text-dark dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                <i class="bi bi-person-circle fs-4 me-2"></i>
                <span id="profileName">Admin</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item text-danger" href="#" id="logoutBtnDropdown"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
            </ul>
        </div>
    </div>

    <div class="container-fluid p-4">
        <div id="alertContainer"></div>

        <div class="content-card">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">
                <div class="d-flex align-items-center gap-2">
                    <label class="form-label mb-0 fw-semibold">Select Date:</label>
                    <input type="date" id="attendanceDate" class="form-control" style="max-width:200px;">
                </div>
                <button class="btn btn-primary" id="saveAttendanceBtn">
                    <i class="bi bi-check2-circle me-1"></i> Save Attendance
                </button>
            </div>
            <p class="text-muted small mb-3">
                <span class="fw-semibold">P</span> = Present &nbsp;•&nbsp;
                <span class="fw-semibold">A</span> = Absent &nbsp;•&nbsp;
                <span class="fw-semibold">L</span> = Leave
            </p>

            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Course</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceBody">
                        <tr><td colspan="4" class="text-center text-muted py-4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="footer mt-auto">
        &copy; 2026 Student Management System | Built by Piyush Kumar
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/common.js"></script>
<script src="../js/attendance.js"></script>
</body>
</html>
