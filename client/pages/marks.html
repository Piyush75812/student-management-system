<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marks | Student Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <i class="bi bi-mortarboard-fill"></i> SMS Admin
    </div>
    <div class="nav flex-column pt-2">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a class="nav-link" href="students.html"><i class="bi bi-people-fill"></i> Students</a>
        <a class="nav-link" href="teachers.html"><i class="bi bi-person-badge-fill"></i> Teachers</a>
        <a class="nav-link" href="courses.html"><i class="bi bi-journal-bookmark-fill"></i> Courses</a>
        <a class="nav-link" href="attendance.html"><i class="bi bi-calendar2-check-fill"></i> Attendance</a>
        <a class="nav-link" href="marks.html"><i class="bi bi-clipboard-data-fill"></i> Marks</a>
        <a class="nav-link text-danger" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</nav>

<div class="main-content">
    <div class="topbar">
        <button class="sidebar-toggle-btn" id="sidebarToggleBtn"><i class="bi bi-list"></i></button>
        <h5 class="mb-0 fw-bold">Marks</h5>
        <div class="dropdown">
            <a class="d-flex align-items-center text-decoration-none text-dark dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                <i class="bi bi-person-circle fs-4 me-2"></i>
                <span id="profileName">Admin</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item text-danger" href="#" id="logoutBtnDropdown"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
            </ul>
        </div>
    </div>

    <div class="container-fluid p-4">
        <div id="alertContainer"></div>

        <div class="content-card">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                <div class="input-group" style="max-width:320px;">
                    <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                    <input type="text" id="searchInput" class="form-control" placeholder="Search by student name or ID...">
                </div>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#marksModal" onclick="openAddModal()">
                    <i class="bi bi-plus-lg me-1"></i> Add Marks
                </button>
            </div>

            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Course</th>
                            <th>Exam Type</th>
                            <th>Marks</th>
                            <th>Percentage</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="marksBody">
                        <tr><td colspan="7" class="text-center text-muted py-4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="footer mt-auto">
        &copy; 2026 Student Management System | Built by Piyush Kumar
    </footer>
</div>

<!-- Add/Edit Marks Modal -->
<div class="modal fade" id="marksModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form id="marksForm">
                <div class="modal-header">
                    <h5 class="modal-title" id="marksModalTitle">Add Marks</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="marksDbId">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Student</label>
                            <select class="form-select" id="student_id" required></select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Course</label>
                            <select class="form-select" id="course_id"></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Exam Type</label>
                            <select class="form-select" id="exam_type" required>
                                <option value="">Select</option>
                                <option value="Mid Term">Mid Term</option>
                                <option value="Final Term">Final Term</option>
                                <option value="Assignment">Assignment</option>
                                <option value="Quiz">Quiz</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Marks Obtained</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="marks_obtained" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Max Marks</label>
                            <input type="number" step="0.01" min="1" class="form-control" id="max_marks" value="100" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Marks</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body text-center p-4">
                <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem;"></i>
                <h5 class="mt-3">Are you sure?</h5>
                <p class="text-muted">This marks record will be permanently deleted.</p>
                <div class="d-flex justify-content-center gap-2 mt-3">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/common.js"></script>
<script src="../js/marks.js"></script>
</body>
</html>
